<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>智能售后工单系统</title>

    <link rel="stylesheet"
          href="./css/style.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header>

        <h1>智能售后工单系统</h1>

        <p>AI Complaint Assistant</p>

    </header>

    <!-- 输入区域 -->

    <section class="card">

        <h2 class="section-title">

            1. 问题输入

        </h2>

        <div class="form-grid">

            <div class="left-panel">

                <label for="userText">

                    问题描述

                </label>

                <textarea id="userText"
                          placeholder="请输入遇到的问题...">
                </textarea>

                <button id="submitBtn">

                    提交工单

                </button>

            </div>

            <div class="right-panel">

                <label for="imageInput">

                    上传图片 / 视频（可选）

                </label>

                <div class="upload-box">

                    <p>

                        点击上传文件

                    </p>

                    <input type="file"
                           id="imageInput">

                </div>

            </div>

        </div>

    </section>

    <!-- 识别结果 -->

    <section class="card">

        <h2 class="section-title">

            2. 识别结果

        </h2>

        <div class="result-grid">

            <div class="result-card">

                <h3>工单ID</h3>

                <p id="ticketId">

                    TICKET-001

                </p>

            </div>

            <div class="result-card">

                <h3>问题类别</h3>

                <p id="issueCategory">

                    Overheating

                </p>

            </div>

            <div class="result-card">

                <h3>紧急程度</h3>

                <p id="urgencyLevel"
                   class="high">

                    High

                </p>

            </div>

            <div class="result-card">

                <h3>保修状态</h3>

                <p id="warrantyStatus">

                    In Warranty

                </p>

            </div>

        </div>

        <div class="reply-container">

            <div class="reply-box">

                <h3>

                    AI回复

                </h3>

                <p id="aiReply">

                    AI分析结果将在这里显示。

                </p>

            </div>

            <div class="reply-box">

                <h3>

                    SOP指导建议

                </h3>

                <p id="sopGuide">

                    SOP建议将在这里显示。

                </p>

            </div>

        </div>

    </section>

    <!-- 历史记录 -->

    <section class="card">

        <h2 class="section-title">

            3. 历史工单记录

        </h2>

        <table>

            <thead>

            <tr>

                <th>工单ID</th>

                <th>提交时间</th>

                <th>问题类别</th>

                <th>紧急程度</th>

                <th>保修状态</th>

            </tr>

            </thead>

            <tbody id="historyTable">

            <tr>

                <td>TICKET-001</td>

                <td>2026-05-17 14:30</td>

                <td>Overheating</td>

                <td class="high">

                    High

                </td>

                <td>

                    In Warranty

                </td>

            </tr>

            </tbody>

        </table>

    </section>

</div>

<script src="./js/app.js"></script>

</body>

</html>
