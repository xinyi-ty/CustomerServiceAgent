<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>华工之光客诉系统</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --primary:#2563eb;
    --primary-light:#4f46e5;
    --text:#0f172a;
    --sub:#64748b;
    --border:#e2e8f0;
}

body{
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    sans-serif;

    background:#ffffff;
    color:var(--text);
    overflow-x:hidden;
    min-height:100vh;
}

/* =======================
   背景
======================= */

.grid-bg{
    position:fixed;
    inset:0;
    z-index:-5;

    background-image:
        linear-gradient(
            rgba(15,23,42,.045) 1px,
            transparent 1px
        ),
        linear-gradient(
            90deg,
            rgba(15,23,42,.045) 1px,
            transparent 1px
        );

    background-size:40px 40px;
}

.glow-top{
    position:fixed;
    top:-260px;
    right:-260px;

    width:800px;
    height:800px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(37,99,235,.12),
        transparent 70%
    );

    z-index:-3;
}

.glow-bottom{
    position:fixed;
    bottom:-180px;
    left:-180px;

    width:500px;
    height:500px;

    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(79,70,229,.08),
        transparent 70%
    );

    z-index:-3;
}

/* =======================
   主布局
======================= */

.container{
    max-width:1400px;
    margin:auto;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:space-between;

    gap:80px;
    padding:40px;
}

/* =======================
   左侧
======================= */

.left{
    flex:1;
    max-width:650px;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:10px;

    padding:10px 18px;

    border-radius:999px;

    background:
    rgba(255,255,255,.9);

    border:
    1px solid rgba(226,232,240,.9);

    backdrop-filter:blur(12px);

    font-size:14px;
    font-weight:600;
    color:#475569;

    margin-bottom:30px;
}

.badge-dot{
    width:8px;
    height:8px;
    border-radius:50%;

    background:#2563eb;

    box-shadow:
    0 0 12px
    rgba(37,99,235,.6);
}

.title{
    font-size:
    clamp(52px,7vw,82px);

    line-height:1.02;
    letter-spacing:-0.06em;
    font-weight:800;

    margin-bottom:28px;
}

.highlight{
    color:var(--primary);
}

.subtitle{
    font-size:19px;
    line-height:1.9;
    color:var(--sub);

    max-width:620px;
    margin-bottom:45px;
}

/* =======================
   按钮
======================= */

.actions{
    display:flex;
    gap:18px;
}

.btn{
    height:58px;
    border:none;
    border-radius:20px;

    padding:0 34px;

    font-size:15px;
    font-weight:700;

    cursor:pointer;
    transition:.25s ease;
}

.primary-btn{
    background:
    linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
    );

    color:white;

    box-shadow:
    0 18px 40px
    rgba(37,99,235,.25);
}

.primary-btn:hover{
    transform:
    translateY(-4px);
}

.secondary-btn{
    background:white;
    border:1px solid var(--border);
    color:var(--text);
}

.secondary-btn:hover{
    background:#f8fafc;
}

/* =======================
   右侧视觉区域
======================= */

.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.visual-wrapper{
    position:relative;
    width:620px;
    height:620px;
}

/* 中央 AI 核心 */

.ai-orb{
    position:absolute;
    inset:0;
    margin:auto;

    width:300px;
    height:300px;

    border-radius:50%;

    background:
    radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,.95),
        rgba(59,130,246,.22),
        rgba(79,70,229,.16)
    );

    backdrop-filter:blur(30px);

    border:
    1px solid rgba(255,255,255,.65);

    box-shadow:
    0 0 80px rgba(37,99,235,.12),
    inset 0 0 60px rgba(255,255,255,.5);

    display:flex;
    align-items:center;
    justify-content:center;

    animation:
    floatOrb 6s ease-in-out infinite;
}

.logo-core{
    width:120px;
    height:120px;

    border-radius:36px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #4f46e5
    );

    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:42px;
    font-weight:800;

    box-shadow:
    0 20px 50px
    rgba(37,99,235,.35);
}

/* 外环 */

.ring{
    position:absolute;
    border-radius:50%;
    border:1px solid
    rgba(37,99,235,.10);

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%);
}

.ring-1{
    width:420px;
    height:420px;
    animation:rotateSlow 22s linear infinite;
}

.ring-2{
    width:520px;
    height:520px;
    animation:rotateSlowReverse 28s linear infinite;
}

.ring-3{
    width:620px;
    height:620px;
    opacity:.6;
}

/* 漂浮粒子 */

.dot{
    position:absolute;
    border-radius:50%;
    background:#2563eb;
    box-shadow:
    0 0 18px rgba(37,99,235,.4);
}

.dot1{
    width:10px;
    height:10px;
    top:90px;
    left:140px;
}

.dot2{
    width:14px;
    height:14px;
    right:120px;
    top:180px;
}

.dot3{
    width:8px;
    height:8px;
    bottom:160px;
    left:100px;
}

.dot4{
    width:12px;
    height:12px;
    right:160px;
    bottom:120px;
}

/* 浮动标签 */

.floating-card{
    position:absolute;

    background:
    rgba(255,255,255,.72);

    backdrop-filter:blur(20px);

    border:
    1px solid rgba(255,255,255,.6);

    border-radius:24px;

    padding:18px 22px;

    box-shadow:
    0 20px 40px
    rgba(15,23,42,.06);
}

.fc1{
    top:80px;
    left:0;
}

.fc2{
    right:0;
    top:120px;
}

.fc3{
    bottom:100px;
    left:30px;
}

.card-title{
    font-size:15px;
    font-weight:700;
    margin-bottom:6px;
}

.card-sub{
    font-size:13px;
    color:var(--sub);
}

/* =======================
   动画
======================= */

@keyframes floatOrb{
    0%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
    100%{
        transform:translateY(0);
    }
}

@keyframes rotateSlow{
    from{
        transform:
        translate(-50%,-50%)
        rotate(0deg);
    }

    to{
        transform:
        translate(-50%,-50%)
        rotate(360deg);
    }
}

@keyframes rotateSlowReverse{
    from{
        transform:
        translate(-50%,-50%)
        rotate(360deg);
    }

    to{
        transform:
        translate(-50%,-50%)
        rotate(0deg);
    }
}

/* =======================
   入场动画
======================= */

.left{
    animation:
    fadeUp .8s ease;
}

.right{
    animation:
    fadeUp 1s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:
        translateY(40px);
    }

    to{
        opacity:1;
        transform:
        translateY(0);
    }
}

/* =======================
   响应式
======================= */

@media(max-width:1100px){

    .container{
        flex-direction:column;
        text-align:center;

        gap:50px;
        padding-top:80px;
    }

    .left{
        display:flex;
        flex-direction:column;
        align-items:center;
    }

    .actions{
        width:100%;
        flex-direction:column;
    }

    .btn{
        width:100%;
    }

    .visual-wrapper{
        width:100%;
        max-width:520px;
        height:520px;
    }

    .floating-card{
        display:none;
    }

    .ring-3{
        width:500px;
        height:500px;
    }
}

</style>
</head>

<body>

<div class="grid-bg"></div>
<div class="glow-top"></div>
<div class="glow-bottom"></div>

<div class="container">

    <!-- 左侧 -->

    <section class="left">

        <div class="badge">
            <div class="badge-dot"></div>
            AI SERVICE PORTAL
        </div>

        <h1 class="title">
            华工之光<br>
            <span class="highlight">
                智能客诉服务平台
            </span>
        </h1>

        <p class="subtitle">
            面向售后场景构建的智能服务入口，
            聚焦问题受理、流程协同与服务体验提升。
            通过更自然的人机交互方式，
            帮助用户更高效地完成问题反馈与处理。
        </p>

        <div class="actions">

            <button
                class="btn primary-btn"
                id="userBtn"
            >
                进入系统 →
            </button>

            <button
                class="btn secondary-btn"
                id="adminBtn"
            >
                管理入口
            </button>

        </div>

    </section>

    <!-- 右侧 -->

    <section class="right">

        <div class="visual-wrapper">

            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>

            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
            <div class="dot dot3"></div>
            <div class="dot dot4"></div>

            <div class="floating-card fc1">
                <div class="card-title">
                    智能识别
                </div>

                <div class="card-sub">
                    自然交互体验
                </div>
            </div>

            <div class="floating-card fc2">
                <div class="card-title">
                    多模态支持
                </div>

                <div class="card-sub">
                    文本与图像处理
                </div>
            </div>

            <div class="floating-card fc3">
                <div class="card-title">
                    服务协同
                </div>

                <div class="card-sub">
                    更高效的问题处理
                </div>
            </div>

            <div class="ai-orb">

                <div class="logo-core">
                    AI
                </div>

            </div>

        </div>

    </section>

</div>

<script>

document
.getElementById('userBtn')
.addEventListener('click',()=>{

    window.location.href =
    'user.html';

});

document
.getElementById('adminBtn')
.addEventListener('click',()=>{

    window.location.href =
    'admin.html';

});

</script>

</body>
</html>
