<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>智能售后助手 - 客户端</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 用户端专属样式补充 */
        .app { display: flex; height: 100vh; background: #f5f7fb; }

        /* 侧边栏 */
        .sidebar { width: 280px; background: #fafcff; border-right: 1px solid #e6edf4; display: flex; flex-direction: column; padding: 20px 16px; }
        .brand { display: flex; align-items: center; gap: 12px; padding: 0 8px 20px 8px; border-bottom: 1px solid #e6edf4; margin-bottom: 20px; }
        .brand-logo { width: 36px; height: 36px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
        .brand-text { font-weight: 600; font-size: 16px; color: #1e2a3e; }
        .brand-sub { font-size: 11px; color: #64748b; margin-top: 2px; }

        .new-chat-btn { width: 100%; padding: 10px 12px; background: #2563eb; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; color: white; cursor: pointer; transition: all 0.2s; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .new-chat-btn:hover { background: #1d4ed8; }
        .icon-plus { width: 14px; height: 14px; position: relative; }
        .icon-plus::before, .icon-plus::after { content: ''; position: absolute; background: white; border-radius: 1px; }
        .icon-plus::before { width: 14px; height: 2px; top: 6px; left: 0; }
        .icon-plus::after { width: 2px; height: 14px; left: 6px; top: 0; }

        .history-title { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 12px; padding-left: 8px; letter-spacing: 0.5px; text-transform: uppercase; }

        /* 工单查询折叠区 */
        .ticket-search { margin-top: auto; border-top: 1px solid #e6edf4; padding-top: 16px; }
        .collapse-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 4px 8px; }
        .collapse-icon { font-size: 10px; color: #64748b; transition: transform 0.2s; }
        .collapse-icon.collapsed { transform: rotate(-90deg); }
        .collapse-content { overflow: hidden; transition: max-height 0.3s ease; max-height: 500px; margin-top: 8px; }
        .collapse-content.collapsed { max-height: 0; margin-top: 0; }

        .search-row { display: flex; gap: 8px; padding: 0 8px; }
        #userSearchTicket { flex: 1; padding: 8px 12px; border: 1px solid #e6edf4; border-radius: 6px; font-size: 13px; background: white; }
        #userSearchTicket:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
        #userSearchBtn { background: #2563eb; border: none; border-radius: 6px; padding: 0 14px; color: white; font-weight: 500; cursor: pointer; font-size: 13px; }
        #searchResult { padding: 0 8px; margin-top: 12px; max-height: 200px; overflow-y: auto; font-size: 12px; }
        .search-result-item { background: white; border: 1px solid #e6edf4; border-radius: 6px; padding: 10px; margin-bottom: 8px; }

        .sidebar-footer { padding: 16px 8px 0; }
        .back-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid #e6edf4; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; color: #64748b; }
        .back-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }

        /* 主内容区 */
        .main { flex: 1; display: flex; flex-direction: column; background: white; }
        .header { height: 60px; display: flex; align-items: center; padding: 0 28px; border-bottom: 1px solid #f1f5f9; }
        .header-title { font-size: 16px; font-weight: 600; color: #1e2a3e; }

        .chat-container { flex: 1; overflow-y: auto; padding: 24px 0; }
        #chatMessages { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding: 0 24px; }

        .message { display: flex; }
        .message.user { justify-content: flex-end; }
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
        .user .bubble { background: #2563eb; color: white; border-bottom-right-radius: 2px; }
        .assistant .bubble { background: #f8fafc; color: #1e2a3e; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px; }

        /* 思考过程 */
        .think-container { margin-bottom: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; background: white; font-size: 12px; }
        .think-summary { padding: 8px 12px; background: #f1f5f9; cursor: pointer; font-weight: 600; color: #475569; display: flex; align-items: center; gap: 6px; }
        .think-content { padding: 10px 12px; background: white; line-height: 1.6; color: #64748b; border-top: 1px solid #e2e8f0; display: none; }

        /* 工单生成徽章 */
        .ticket-badge { display: flex; align-items: center; gap: 6px; margin-top: 12px; padding: 8px 12px; border-radius: 8px; background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; font-size: 12px; font-weight: 500; }
        .badge-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }

        /* 底部输入区 */
        .chat-footer { padding: 16px 24px 24px; background: white; border-top: 1px solid #f1f5f9; }
        .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; align-items: flex-end; gap: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 12px; transition: all 0.2s; }
        .input-wrapper:focus-within { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: white; }

        .upload-btn { background: transparent; border: 1px solid #cbd5e1; font-size: 18px; color: #64748b; cursor: pointer; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .upload-btn:hover { background: #f1f5f9; border-color: #94a3b8; }

        textarea { flex: 1; border: none; outline: none; resize: none; font-size: 14px; line-height: 1.5; font-family: inherit; background: transparent; min-height: 24px; max-height: 120px; padding: 4px 0; }

        .send-btn { background: #2563eb; border: none; color: white; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn:hover:not(:disabled) { background: #1d4ed8; }
        .icon-arrow { width: 12px; height: 12px; border-top: 2px solid white; border-right: 2px solid white; transform: rotate(-45deg) translate(-1px, 1px); }

        #filePreview { max-width: 800px; margin: 8px auto 0; font-size: 12px; color: #64748b; padding-left: 44px; }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo">AI</div>
                <div>
                    <div class="brand-text">智能售后助手</div>
                    <div class="brand-sub">Enterprise Service</div>
                </div>
            </div>

            <button id="newChatBtn" class="new-chat-btn">
                <span class="icon-plus"></span> 新建对话
            </button>

            <div class="ticket-search">
                <div class="collapse-header" id="collapseHeader">
                    <div class="history-title">工单查询</div>
                    <span class="collapse-icon" id="collapseIcon">▼</span>
                </div>
                <div class="collapse-content" id="collapseContent">
                    <div class="search-row">
                        <input type="text" id="userSearchTicket" placeholder="输入工单号查询" />
                        <button id="userSearchBtn">查询</button>
                    </div>
                    <div id="searchResult"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="backToWelcome" class="back-btn">返回首页</button>
            </div>
        </aside>

        <main class="main">
            <header class="header">
                <div class="header-title">智能问题分析与工单协同</div>
            </header>

            <section class="chat-container">
                <div id="chatMessages">
                    <div class="message assistant">
                        <div class="bubble">
                            您好，我是智能售后助手。<br>
                            您可以描述遇到的问题，或上传设备故障图片/视频。<br>
                            系统将自动进行 OCR 识别、质保核验，并生成专业处理建议。
                        </div>
                    </div>
                </div>
            </section>

            <footer class="chat-footer">
                <div class="input-wrapper">
                    <button id="fileLabel" class="upload-btn" type="button" title="上传图片/视频">+</button>
                    <input type="file" id="chatImage" hidden accept="image/*,video/mp4,video/quicktime" />
                    <textarea id="chatInput" rows="1" placeholder="请描述您的设备故障或问题..."></textarea>
                    <button id="sendBtn" class="send-btn" title="发送"><span class="icon-arrow"></span></button>
                </div>
                <div id="filePreview"></div>
            </footer>
        </main>
    </div>
    <script src="user.js"></script>
</body>
</html>
