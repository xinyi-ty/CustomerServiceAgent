<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>智能售后助手</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#ffffff;
    --sidebar:#f8fafc;
    --border:#e5e7eb;
    --text:#111827;
    --sub:#6b7280;
    --primary:#2563eb;
    --hover:#f3f4f6;
}

body{
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
}

/* ==========================
整体布局
========================== */

.app{
    display:flex;
    height:100vh;
}

/* ==========================
左侧 Sidebar
========================== */

.sidebar{
    width:280px;
    background:var(--sidebar);
    border-right:1px solid var(--border);

    display:flex;
    flex-direction:column;

    padding:18px;
}

.brand{
    display:flex;
    align-items:center;
    gap:14px;

    padding:14px;
    margin-bottom:18px;
}

.brand-logo{
    width:42px;
    height:42px;

    border-radius:14px;

    background:
    linear-gradient(
        135deg,
        #2563eb,
        #4f46e5
    );

    color:white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-weight:800;
    font-size:18px;
}

.brand-text{
    font-size:18px;
    font-weight:700;
}

.brand-sub{
    font-size:12px;
    color:var(--sub);
    margin-top:2px;
}

/* 新建会话 */

.new-chat-btn{
    width:100%;
    height:50px;

    border:none;
    border-radius:16px;

    background:var(--primary);
    color:white;

    font-size:15px;
    font-weight:600;

    cursor:pointer;
    transition:.2s ease;

    margin-bottom:22px;
}

.new-chat-btn:hover{
    transform:translateY(-2px);
}

/* 会话列表 */

.chat-history{
    flex:1;
    overflow-y:auto;
}

.history-title{
    font-size:13px;
    color:var(--sub);
    margin-bottom:12px;
    padding-left:4px;
}

.history-item{
    padding:14px;
    border-radius:14px;

    cursor:pointer;
    transition:.2s ease;

    margin-bottom:6px;
}

.history-item:hover{
    background:var(--hover);
}

.history-item.active{
    background:white;
    border:1px solid var(--border);
}

.history-text{
    font-size:14px;
    font-weight:500;
}

.history-time{
    font-size:12px;
    color:var(--sub);
    margin-top:4px;
}

/* footer */

.sidebar-footer{
    border-top:1px solid var(--border);
    padding-top:18px;
}

.back-btn{
    width:100%;
    height:48px;

    border:none;
    border-radius:14px;

    background:white;
    border:1px solid var(--border);

    cursor:pointer;
    font-size:14px;
    font-weight:600;
}

.back-btn:hover{
    background:var(--hover);
}

/* ==========================
右侧聊天区
========================== */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* 顶部 */

.header{
    height:70px;
    border-bottom:1px solid var(--border);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 32px;
}

.header-title{
    font-size:20px;
    font-weight:700;
}

.header-sub{
    font-size:13px;
    color:var(--sub);
    margin-top:3px;
}

/* 聊天区 */

.chat-container{
    flex:1;
    overflow-y:auto;
    padding:30px 0;
}

#chatMessages{
    width:100%;
    max-width:860px;
    margin:auto;

    display:flex;
    flex-direction:column;
    gap:22px;
}

/* message */

.message{
    display:flex;
}

.message.user{
    justify-content:flex-end;
}

.message.assistant{
    justify-content:flex-start;
}

.bubble{
    max-width:760px;

    padding:18px 22px;
    border-radius:22px;

    line-height:1.8;
    font-size:15px;
    white-space:pre-wrap;
    word-break:break-word;
}

.user .bubble{
    background:var(--primary);
    color:white;

    border-bottom-right-radius:8px;
}

.assistant .bubble{
    background:#f9fafb;
    border:1px solid var(--border);

    border-bottom-left-radius:8px;
}

/* 思考链 */

.think-container{
    margin-bottom:14px;
    border-radius:14px;
    overflow:hidden;

    border:1px solid var(--border);
}

.think-summary{
    padding:12px 16px;
    background:#f3f4f6;

    cursor:pointer;
    font-size:13px;
    color:#4b5563;
    font-weight:600;
}

.think-content{
    padding:14px 16px;
    background:white;

    color:#6b7280;
    font-size:13px;
    line-height:1.8;
}

/* 工单 badge */

.ticket-badge{
    display:inline-flex;
    margin-top:14px;

    padding:8px 14px;
    border-radius:999px;

    background:#eff6ff;
    color:#2563eb;

    font-size:13px;
    font-weight:600;
}

/* ==========================
输入区
========================== */

.chat-footer{
    padding:24px;
    border-top:1px solid var(--border);
    background:white;
}

.input-wrapper{
    max-width:860px;
    margin:auto;

    background:white;

    border:1px solid var(--border);
    border-radius:26px;

    display:flex;
    align-items:flex-end;
    gap:12px;

    padding:14px 16px;

    box-shadow:
    0 4px 18px rgba(0,0,0,.04);
}

.upload-btn{
    width:44px;
    height:44px;

    border-radius:14px;
    border:none;

    background:#f3f4f6;

    cursor:pointer;
    flex-shrink:0;

    font-size:20px;
}

.upload-btn:hover{
    background:#e5e7eb;
}

textarea{
    flex:1;
    border:none;
    outline:none;
    resize:none;

    font-size:15px;
    line-height:1.7;
    font-family:inherit;

    min-height:28px;
    max-height:180px;

    background:transparent;
}

.send-btn{
    width:48px;
    height:48px;

    border:none;
    border-radius:16px;

    background:var(--primary);
    color:white;

    cursor:pointer;
    flex-shrink:0;

    font-size:18px;
}

.send-btn:hover{
    background:#1d4ed8;
}

.send-btn:disabled{
    opacity:.5;
}

#filePreview{
    max-width:860px;
    margin:10px auto 0;
    color:#6b7280;
    font-size:13px;
}

/* ==========================
移动端
========================== */

@media(max-width:900px){

    .sidebar{
        display:none;
    }

    .header{
        padding:0 20px;
    }

    .chat-container{
        padding:20px 14px;
    }

    .chat-footer{
        padding:14px;
    }

    .bubble{
        max-width:90%;
    }
}
</style>
</head>

<body>

<div class="app">

    <!-- 左侧 -->
    <aside class="sidebar">

        <div class="brand">
            <div class="brand-logo">
                AI
            </div>

            <div>
                <div class="brand-text">
                    智能售后助手
                </div>

                <div class="brand-sub">
                    Huagong AI Service
                </div>
            </div>
        </div>

        <button
            id="newChatBtn"
            class="new-chat-btn"
        >
            新建对话
        </button>

        <div class="chat-history">

            <div class="history-title">
                最近对话
            </div>

            <div class="history-item active">
                <div class="history-text">
                    当前会话
                </div>

                <div class="history-time">
                    刚刚
                </div>
            </div>

        </div>

        <div class="sidebar-footer">

            <button
                id="backToWelcome"
                class="back-btn"
            >
                返回首页
            </button>

        </div>

    </aside>

    <!-- 右侧 -->
    <main class="main">

        <header class="header">

            <div>
                <div class="header-title">
                    智能售后助手
                </div>

                <div class="header-sub">
                    智能问题分析与工单协同
                </div>
            </div>

        </header>

        <section class="chat-container">

            <div id="chatMessages">

                <div class="message assistant">
                    <div class="bubble">
您好，我是智能售后助手。

您可以描述遇到的问题，
也可以上传图片或视频文件。

系统将协助您分析问题并生成处理建议。
                    </div>
                </div>

            </div>

        </section>

        <footer class="chat-footer">

            <div class="input-wrapper">

                <button
                    id="fileLabel"
                    class="upload-btn"
                    type="button"
                >
                    +
                </button>

                <input
                    type="file"
                    id="chatImage"
                    hidden
                    accept="image/*,video/mp4,video/quicktime"
                />

                <textarea
                    id="chatInput"
                    rows="1"
                    placeholder="请输入您的问题..."
                ></textarea>

                <button
                    id="sendBtn"
                    class="send-btn"
                >
                    ↑
                </button>

            </div>

            <div id="filePreview"></div>

        </footer>

    </main>

</div>

<script src="user.js"></script>

</body>
</html>
